<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klara & Bruno - Naše vjenčanje</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0; padding:0; box-sizing:border-box;}
body{
  font-family:Poppins,sans-serif;
  color:#5a4636;
  overflow-x:hidden;
  background:linear-gradient(-45deg,#fdf8f3,#f6ede3,#f9f3ea,#f6efe6);
  background-size:400% 400%;
  animation:bgMove 20s ease infinite;
}
@keyframes bgMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%;}}

/* WELCOME */
#welcome{
  position:fixed; top:0; left:0; width:100%; height:100%;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  background:url('hero01.jpg') center/cover no-repeat;
  z-index:9999; padding:20px;
}
.rings{
  font-size:clamp(40px,8vw,70px);
  margin-bottom:20px;
  animation:float 3s ease-in-out infinite;
}
@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-12px)}100%{transform:translateY(0)}}
#welcome h1{
  font-family:"Playfair Display",serif;
  font-size:clamp(32px,8vw,52px);
  margin-bottom:5px;
  color:#fff;
  text-shadow:0 2px 10px rgba(0,0,0,0.4);
}
.date{font-size:clamp(14px,3vw,18px); opacity:0.8; margin-bottom:25px; color:#fff;}
#welcome p{
  max-width:550px; line-height:1.7em; opacity:0.85;
  font-size:clamp(14px,3vw,16px); color:#fff;
  text-shadow:0 1px 5px rgba(0,0,0,0.4);
}
.enterBtn{
  margin-top:35px; padding:14px 35px; border:none; border-radius:40px;
  font-size:16px; background:linear-gradient(45deg,#c6a46c,#e8c88a);
  color:white; cursor:pointer; box-shadow:0 15px 35px rgba(0,0,0,0.25);
  transition:0.3s;
}
.enterBtn:hover{transform:scale(1.08);}

/* HERO */
.hero{
  padding:clamp(80px,12vw,120px) 20px 60px;
  background:url('hero.jpg') center/cover no-repeat;
  position:relative;
}
.hero h1{
  font-family:"Playfair Display",serif;
  font-size:clamp(32px,7vw,50px);
  color:#fff; text-shadow:0 2px 10px rgba(0,0,0,0.3);
}
.hero p{
  font-size:clamp(15px,3vw,18px); color:#fff;
  opacity:0.85; text-shadow:0 2px 10px rgba(0,0,0,0.3);
}

/* CARD */
.card{
  max-width:950px; width:90%; margin:auto;
  background:rgba(255,255,255,0.85); backdrop-filter:blur(12px);
  padding:clamp(25px,4vw,45px); border-radius:22px;
  box-shadow:0 25px 60px rgba(0,0,0,0.25);
}

/* GALLERY */
.gallery{
  display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:18px; margin-top:35px;
}
.gallery img, .gallery video{
  width:100%; border-radius:12px; cursor:pointer; transition:0.4s;
}
.gallery img:hover, .gallery video:hover{
  transform:scale(1.06);
  box-shadow:0 0 25px rgba(201,170,99,0.8);
}

/* BUTTONS */
.uploadBtn, .downloadAllBtn{
  margin-top:25px; padding:14px 30px; border:none;
  border-radius:35px; font-size:16px; cursor:pointer;
  background:linear-gradient(45deg,#c6a46c,#e8c88a); color:white;
}
.downloadAllBtn{background:linear-gradient(45deg,#e8c88a,#c6a46c); margin-left:10px;}

/* LIGHTBOX */
#lightbox{
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.85); display:none;
  justify-content:center; align-items:center; z-index:999; padding:20px;
}
#lightbox img, #lightbox video{
  max-width:95%; max-height:90%; border-radius:10px;
}
.lightboxNav{
  position:absolute; top:50%; transform:translateY(-50%);
  font-size:50px; color:white; cursor:pointer; user-select:none;
  padding:10px;
  font-weight:bold;
}
#prev{left:10px;} #next{right:10px;}

/* PARTICLES */
.particle{position:fixed; width:6px; height:6px; background:rgba(173,216,230,0.8); border-radius:50%; opacity:0.7; animation:floatUp linear infinite;}
.heart{position:fixed; width:12px; height:12px; background:#fff; clip-path: polygon(50% 0%, 61% 15%, 75% 15%, 85% 25%, 85% 50%, 50% 100%, 15% 50%, 15% 25%, 25% 15%, 39% 15%); opacity:0.9; animation:floatUp linear infinite;}
@keyframes floatUp{from{transform:translateY(100vh)} to{transform:translateY(-10vh);}}

/* MOBILE */
@media(max-width:600px){
  .card{margin-top:20px;}
  .uploadBtn, .downloadAllBtn{width:100%; max-width:260px; margin-left:0;}
  .lightboxNav{font-size:35px;}
}
</style>
</head>
<body>
<audio id="music" loop autoplay>
  <source src="paulyudin-wedding-485932.mp3" type="audio/mpeg">
</audio>

<div id="welcome">
  <div class="rings">💍</div>
  <h1>Klara & Bruno</h1>
  <div class="date">20. srpnja 2026</div>
  <p>Dobrodošli na naš poseban dan. Hvala što ste dio trenutka koji ćemo pamtiti cijeli život.</p>
  <button class="enterBtn" onclick="startExperience()">Uđite na naše vjenčanje</button>
</div>

<div class="hero">
  <h1>Naše vjenčanje 💍</h1>
  <p>Hvala što ste dio našeg najljepšeg dana.</p>
</div>

<div class="card">
  <p id="typing"></p>
  <div class="gallery" id="gallery"></div>
  <input type="file" id="fileInput" multiple accept="image/*,video/*" style="display:none">
  <button class="uploadBtn" onclick="addPhotos()">Dodaj svoje slike i videe 📷</button>
  <button class="downloadAllBtn" onclick="downloadAll()">Preuzmi sve 📁</button>
</div>

<div id="lightbox" onclick="closeLightbox()">
  <span class="lightboxNav" id="prev">&#10094;</span>
  <span class="lightboxNav" id="next">&#10095;</span>
  <img id="lightbox-img">
  <video id="lightbox-video" controls style="display:none"></video>
</div>

<script>
let mediaList = [];
let currentIndex = 0;

/* START */
function startExperience(){
  document.getElementById("welcome").style.display="none";
  document.getElementById("music").play();
  createParticles();
  typing();
}

/* TYPING */
const message="Dragi naši gosti, od srca vam hvala što ste danas dio našeg vjenčanja. Vaša prisutnost, osmijesi i ljubav učinili su ovaj dan još posebnijim.";
let i=0;
function typing(){
  if(i<message.length){
    document.getElementById("typing").innerHTML+=message.charAt(i);
    i++;
    setTimeout(typing,40);
  }
}

/* PARTICLES */
function createParticles(){
  for(let i=0;i<40;i++){
    let p=document.createElement("div"); p.className="particle";
    p.style.left=Math.random()*100+"vw"; p.style.animationDuration=(6+Math.random()*10)+"s";
    document.body.appendChild(p);

    let h=document.createElement("div"); h.className="heart";
    h.style.left=Math.random()*100+"vw"; h.style.animationDuration=(4+Math.random()*8)+"s";
    document.body.appendChild(h);
  }
}

/* UPLOAD */
function addPhotos(){ document.getElementById("fileInput").click(); }

function loadStored(){
  fetch('http://localhost:3000/media')
    .then(res=>res.json())
    .then(data=>{
      mediaList=data;
      renderGallery();
    });
}

function renderGallery(){
  let gallery=document.getElementById("gallery");
  gallery.innerHTML="";
  mediaList.forEach((item,index)=>{
    let media;
    if(item.type.startsWith("video")){
      media=document.createElement("video"); media.src='http://localhost:3000/uploads/'+item.filename; media.controls=true;
    }else{
      media=document.createElement("img"); media.src='http://localhost:3000/uploads/'+item.filename;
    }
    gallery.appendChild(media);
    media.onclick=()=>openLightbox(index);
  });
}

document.getElementById("fileInput").addEventListener("change",function(e){
  for(let file of e.target.files){
    let formData=new FormData();
    formData.append('file',file);
    fetch('http://localhost:3000/upload',{
      method:'POST',
      body:formData
    }).then(()=>loadStored());
  }
});

/* LIGHTBOX */
function openLightbox(index){
  currentIndex=index;
  showLightbox();
  document.getElementById("lightbox").style.display="flex";
}
function showLightbox(){
  let img=document.getElementById("lightbox-img");
  let video=document.getElementById("lightbox-video");
  let item=mediaList[currentIndex];
  if(item.type.startsWith("video")){
    video.src='http://localhost:3000/uploads/'+item.filename;
    video.style.display="block";
    img.style.display="none";
  }else{
    img.src='http://localhost:3000/uploads/'+item.filename;
    img.style.display="block";
    video.style.display="none";
  }
}
document.getElementById("prev").onclick=function(e){e.stopPropagation(); currentIndex=(currentIndex-1+mediaList.length)%mediaList.length; showLightbox();}
document.getElementById("next").onclick=function(e){e.stopPropagation(); currentIndex=(currentIndex+1)%mediaList.length; showLightbox();}
function closeLightbox(){document.getElementById("lightbox").style.display="none";}

/* DOWNLOAD ALL */
function downloadAll(){
  mediaList.forEach((item,index)=>{
    let a=document.createElement("a");
    a.href='http://localhost:3000/uploads/'+item.filename;
    a.download=item.filename;
    a.click();
  });
}

/* INIT */
window.onload=loadStored;
</script>
</body>
</html>
